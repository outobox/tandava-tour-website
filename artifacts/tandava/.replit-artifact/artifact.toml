kind = "web"
previewPath = "/"
title = "Tandava Tour Company"
version = "1.0.0"
id = "artifacts/tandava"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20208

[services.development]
run = "pnpm --filter @workspace/tandava run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tandava", "run", "build" ]
publicDir = "artifacts/tandava/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20208"
BASE_PATH = "/"
